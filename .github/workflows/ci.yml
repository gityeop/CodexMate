name: CI

on:
  push:
  pull_request:

jobs:
  swift-test:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Show selected Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version
      - name: Resolve package dependencies
        run: swift package resolve
      - name: Run tests
        run: swift test
